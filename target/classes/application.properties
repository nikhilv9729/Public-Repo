spring.application.name=event-booking-system

# ── Server ──────────────────────────────────────────────────────────────────
server.port=8080

# ── H2 In-Memory Database ───────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:eventbookingdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ─────────────────────────────────────────────────────────────────────
# 64-char secret (minimum 512-bit for HS256 in jjwt 0.11+)
app.jwt.secret=eventhub-super-secret-key-for-jwt-signing-must-be-at-least-64-chars-long-1234
app.jwt.expiration-ms=86400000

# ── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.eventbooking=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
